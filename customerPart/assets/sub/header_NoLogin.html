<div id="custom-menu" class="custom-menu">
  <ul>
    <li onclick="window.location.href = './homePage.html';">home Page</li>

      <li onmousedown="copyFunction()">Copy</li>
      <li onmousedown="pasteFunction()">Paste</li>

<script>


//login function
  $('#loginButton').on('click', function() {
    console.log('loginButton clicked');
    const email = $('#login').val();
    const password = $('#password').val();
    const errorMessage = $('#error-message');

    if (email === 'ken@vtc.com' && password === 'Aa123456') {
        window.location.href = './UserHome.html';
    } else {
      console.log('loginButton clicked 2');
        errorMessage.removeClass('hidden');
        errorMessage.addClass('block');
        setTimeout(function() {
          errorMessage.removeClass('block');
          errorMessage.addClass('hidden');
        }, 2000);
    }
});

  // Get the modal
  var modal = document.getElementById("login-modal");
  var interLogin = document.getElementById('interLogin');
  // Get the button that opens the modal
  var btn = document.getElementById("btnOpenLogin");

  // When the user clicks the button, open the modal
  btn.onclick = function() {
    modal.classList.remove("hidden");
  }

  // When the user clicks anywhere outside of the modal, close it
  window.onclick = function(event) {
    if (event.target == interLogin) {
      modal.classList.add("hidden");
    }
  }



  var activeElement = null;
        document.getElementsByTagName('body')[0].addEventListener('contextmenu', function(event) {
            event.preventDefault();
            const menu = document.getElementById('custom-menu');
          menu.style.display = 'block';
          menu.style.left = `${event.pageX}px`;
          menu.style.top = `${event.pageY}px`;
          activeElement = document.activeElement;
        });
        document.addEventListener('click', function() {
          const menu = document.getElementById('custom-menu');
          menu.style.display = 'none';
        });
      function copyFunction() {
          let selectedText = '';

          if (window.getSelection) {
              selectedText = window.getSelection().toString();
              console.log('Selected text using window.getSelection:', selectedText);
          } else if (document.selection && document.selection.type != "Control") {
              selectedText = document.selection.createRange().text;
              console.log('Selected text using document.selection:', selectedText);
          }

          if (selectedText) {

              navigator.clipboard.writeText(selectedText)
                  .then(() => {
                      console.log('Text copied to clipboard:', selectedText);
                  })
                  .catch(err => {
                      console.error('Failed to copy text:', err);
                  });
          } else {
              console.log('No text selected to copy.');
          }
      }

      function pasteFunction() {
          // Check if the Clipboard API is supported
          if (!navigator.clipboard) {
              console.error('Clipboard API not supported');
              return;
          }

          // Use Clipboard API to get text from the clipboard
          navigator.clipboard.readText()
              .then(text => {
                  insertTextAtCursor(text); // Assuming you have a function to insert text at the cursor
                  console.log('Text pasted from clipboard:', text);
              })
              .catch(err => {
                  console.error('Failed to read text from clipboard:', err);
              });
      }

      // Example function to insert text at the cursor position
      function insertTextAtCursor(text) {
          if (activeElement && activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA') {
              const start = activeElement.selectionStart;
              const end = activeElement.selectionEnd;
              activeElement.value = activeElement.value.substring(0, start) + text + activeElement.value.substring(end);
              activeElement.selectionStart = activeElement.selectionEnd = start + text.length;
          } else {
              console.log('No input or textarea is focused');
          }
      }
</script>
