<script>
$(function () {
    $("header").load("./assets/sub/header_NoLogin_staff.html", function() {
        $("#homeTag").removeClass('text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-700');
        $("#homeTag").addClass('text-white bg-blue-700 md:bg-transparent md:text-blue-700 md:p-0 md:text-blue-500');
    });
    $("footer").load("./assets/sub/footer.html");
    $("#carList").load("./assets/sub/carList.html");
});

  

  document.getElementById('InsuranceForm').addEventListener('submit', function(event) {
      event.preventDefault();
      $('#showNumber').removeClass("hidden");
      const vModel = document.getElementById('carInput').value;
      const mileage = document.getElementById('Mileage').value;
      const vehicleYear = document.getElementById('VehicleYear').value;
      const drivingExperience = document.getElementById('DrivingExperience').value;
      const yourAge = document.getElementById('yourAge').value;

      console.log('carInput:', vModel);
      console.log('Mileage:', mileage);
      console.log('Vehicle Year:', vehicleYear);
      console.log('Driving Experience:', drivingExperience);
      console.log('Your Age:', yourAge);
      const finalNumber = mileage; 
      const numDigits = finalNumber.toString().length; 
      const symbols = ['@', '#', '$', '%', '&', '*', '!', '?']; 

      function formatNumber(number) {
          return number.toString().padStart(numDigits, '0'); 
      }

      function generateRandomCombination() {
          let result = '';
          for (let i = 0; i < numDigits; i++) {
              if (Math.random() > 0.5) {
                  result += symbols[Math.floor(Math.random() * symbols.length)]; 
              } else {
                  result += Math.floor(Math.random() * 10); 
              }
          }
          return result; 
      }

      function animateNumber() {
          const numberElement = document.getElementById('number');
          let iterations = 20; 
          const interval = setInterval(() => {
              numberElement.textContent = generateRandomCombination();
              numberElement.style.opacity = 0.5; 
              setTimeout(() => {
                  numberElement.style.opacity = 1; 
              }, 50); 
          }, 75);

          setTimeout(() => {
              clearInterval(interval);
              numberElement.textContent = formatNumber(finalNumber); 
          }, iterations * 50); 
      }

      animateNumber();
      });

</script>
