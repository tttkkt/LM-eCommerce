<style>
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .fade-in {
            opacity: 0;
            animation: fadeIn 1s forwards;
        }
</style>

<center class="mt-32">
<label>

        <br>
        <span class="font-bold">
            Welcome to Legend Insurance
        </span>
        <br>
        <br>

        <br>
        <br>
        <span class="font-bold">
            Our Mission
        </span>
        <br>
        <br>
        Our mission is to offer unparalleled insurance services that provide security and assurance to individuals, families, and businesses. We strive to build lasting relationships with our clients by understanding their needs and delivering solutions that exceed their expectations. At Legend Insurance, we are dedicated to being a reliable partner in your journey towards a secure future.
